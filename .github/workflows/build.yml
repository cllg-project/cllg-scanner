name: Build CLLG Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            eb_platform: linux
          - os: windows-latest
            eb_platform: win
          - os: macos-latest
            eb_platform: mac

    runs-on: ${{ matrix.os }}

    permissions:
      id-token: write   # required by SignPath OIDC verification
      contents: read

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Node dependencies
        run: npm ci

      - name: Install AppImage dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get install -y libfuse2

      - name: Build app
        run: npm run build

      - name: Package (electron-builder)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9] ]]; then
            VERSION="$TAG"
          else
            VERSION="0.0.1"
          fi
          npx electron-builder --${{ matrix.eb_platform }} --publish never \
            --config.extraMetadata.version="$VERSION"

      - name: Locate Windows executable
        if: matrix.eb_platform == 'win'
        shell: bash
        run: echo "EXE_PATH=$(find dist -name '*.exe' | head -1)" >> $GITHUB_ENV

      - name: Sign Windows artifact (SignPath)
        if: matrix.eb_platform == 'win'
        uses: SignPath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: cllg-desktop
          signing-policy-slug: release-signing
          input-artifact-path: ${{ env.EXE_PATH }}
          output-artifact-path: ${{ env.EXE_PATH }}
          wait-for-completion: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: cllg-desktop-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
