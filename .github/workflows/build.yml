name: Build CLLG Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            eb_platform: linux
            python_os: linux
            python_arch: x86_64-unknown-linux-gnu
          - os: windows-latest
            platform: win32
            eb_platform: win
            python_os: windows
            python_arch: x86_64-pc-windows-msvc
          - os: macos-latest
            platform: darwin
            eb_platform: mac
            python_os: apple
            python_arch: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Node dependencies
        run: npm ci

      # Download python-build-standalone for target platform
      - name: Download portable Python
        shell: bash
        run: |
          # python-build-standalone by Astral (https://github.com/astral-sh/python-build-standalone)
          PYTHON_VERSION="3.12.7"
          RELEASE_DATE="20241016"
          ARCH="${{ matrix.python_arch }}"

          if [[ "${{ matrix.platform }}" == "win32" ]]; then
            FILE="cpython-${PYTHON_VERSION}+${RELEASE_DATE}-${ARCH}-install_only.tar.gz"
          elif [[ "${{ matrix.platform }}" == "darwin" ]]; then
            FILE="cpython-${PYTHON_VERSION}+${RELEASE_DATE}-${ARCH}-install_only.tar.gz"
          else
            FILE="cpython-${PYTHON_VERSION}+${RELEASE_DATE}-${ARCH}-install_only.tar.gz"
          fi

          URL="https://github.com/astral-sh/python-build-standalone/releases/download/${RELEASE_DATE}/${FILE}"
          echo "Downloading $URL"
          curl -L "$URL" -o python.tar.gz

          mkdir -p resources/python-${{ matrix.platform }}
          tar -xzf python.tar.gz -C resources/python-${{ matrix.platform }} --strip-components=1

      # Install Python pipeline dependencies into the bundled Python
      - name: Install Python deps into bundled Python
        shell: bash
        run: |
          PYTHON_DIR="resources/python-${{ matrix.platform }}"
          if [[ "${{ matrix.platform }}" == "win32" ]]; then
            PYTHON_BIN="$PYTHON_DIR/python.exe"
          else
            PYTHON_BIN="$PYTHON_DIR/bin/python3"
          fi
          "$PYTHON_BIN" -m pip install --upgrade pip
          "$PYTHON_BIN" -m pip install lxml pyyaml regex

      - name: Install AppImage dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get install -y libfuse2

      - name: Build app
        run: npm run build

      - name: Package (electron-builder)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9] ]]; then
            VERSION="$TAG"
          else
            VERSION="0.0.1"
          fi
          npx electron-builder --${{ matrix.eb_platform }} --publish never \
            --config.extraMetadata.version="$VERSION"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: cllg-desktop-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
