appId: com.cllg.desktop
productName: CLLG Desktop
copyright: Built by Inria — ALMAnaCH Team, under Apache License 2.0
afterPack: afterPack.js

directories:
  output: dist

files:
  - out/**/*
  - node_modules/**/*
  - '!**/.git/**'

win:
  target:
    - target: portable
      arch:
        - x64
  icon: cllg.ico

mac:
  target:
    - target: dmg
      arch:
        - arm64
  icon: cllg.ico
  category: public.app-category.developer-tools

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: cllg.png
  category: Utility
