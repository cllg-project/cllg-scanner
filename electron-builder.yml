appId: com.cllg.desktop
productName: CLLG Desktop
copyright: Built by Inria — ALMAnaCH Team, under Apache License 2.0
afterPack: afterPack.js

directories:
  output: dist

files:
  - out/**/*
  - node_modules/**/*
  - '!**/.git/**'

asarUnpack:
  - node_modules/onnxruntime-node/**
  - node_modules/kraken-js/**

extraResources:
  - from: resources/models/
    to: models/
    filter:
      - '**/*.js_mlmodel'

win:
  target:
    - target: portable
      arch:
        - x64
  icon: cllg.ico

mac:
  target:
    - target: dmg
      arch:
        - arm64
  icon: cllg.ico
  category: public.app-category.developer-tools

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: cllg.png
  category: Utility
