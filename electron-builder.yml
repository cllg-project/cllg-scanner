appId: com.cllg.desktop
productName: CLLG Desktop
copyright: Copyright © 2024

directories:
  output: dist

files:
  - out/**/*
  - node_modules/**/*
  - '!**/.git/**'
  - '!python/**'

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: cllg.ico

mac:
  target:
    - target: dmg
      arch:
        - arm64
  icon: cllg.ico
  category: public.app-category.developer-tools

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: cllg.png
  category: Utility

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: cllg.ico
  uninstallerIcon: cllg.ico
